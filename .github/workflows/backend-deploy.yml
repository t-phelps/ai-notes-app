name: Azure Backend Deploy

on:
  push:
    branches: [ "main" ]
    paths: [ "backend/**" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/backend
          acrName: notesiregistry # not the login server
          containerAppName: backend-notes-api
          resourceGroup: backend-ai-notes-app-rg
          imageToBuild: notesiregistry-bhbmd9bbgrbxaffb.azurecr.io/backend-api:${{ github.sha }}
